name: Perf Nightly

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  perf-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run perf smoke checks
        env:
          API_URL: ${{ secrets.PERF_API_URL }}
          PERF_TOKEN: ${{ secrets.PERF_TOKEN }}
          PERF_ITERATIONS: "30"
          PERF_P95_BUDGET_MS: "900"
          PERF_ERROR_BUDGET: "0.01"
        run: bun run perf:smoke

